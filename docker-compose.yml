# SentinelClaw — Docker Compose Konfiguration
# Start: docker compose up -d
# Voraussetzung: OpenShell Gateway läuft (openshell gateway start)
# Optional: --profile monitoring (Prometheus + Grafana)
#           --profile postgresql (PostgreSQL statt SQLite)

services:
  # API-Server: FastAPI Backend mit OpenShell-Integration
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: sentinelclaw-api
    restart: unless-stopped
    # Root für Docker-Socket-Zugriff (Watchdog Kill-Pfad)
    user: root
    labels:
      sentinelclaw: "true"
      sentinelclaw.role: "api"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    volumes:
      - ./data:/app/data
      - ./workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      # OpenShell-Config (mTLS-Zertifikate + Gateway-Metadaten)
      - ~/.config/openshell:/openshell-config:ro
    networks:
      - sentinel-internal
      - sentinel-scanning
    ports:
      - "${SENTINEL_API_PORT:-3001}:3001"
    environment:
      OPENSHELL_GATEWAY_ENDPOINT: "https://host.docker.internal:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Frontend: React Web-UI (Nginx + Reverse-Proxy zur API)
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: sentinelclaw-frontend
    restart: unless-stopped
    labels:
      sentinelclaw: "true"
      sentinelclaw.role: "frontend"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - sentinel-internal
      - sentinel-scanning
    ports:
      - "${SENTINEL_FRONTEND_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Watchdog: Unabhängiger Überwachungsprozess (Kill-Switch)
  watchdog:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: sentinelclaw-watchdog
    restart: unless-stopped
    command: ["python", "-m", "src.watchdog"]
    user: root
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      sentinelclaw: "true"
      sentinelclaw.role: "watchdog"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/app/data
    networks:
      - sentinel-internal
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy

  # Prometheus: Metriken-Sammlung und Alerting
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sentinelclaw-prometheus
    restart: unless-stopped
    labels:
      sentinelclaw: "true"
      sentinelclaw.role: "monitoring"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    volumes:
      - ./configs/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    networks:
      - sentinel-internal
      - sentinel-scanning
    ports:
      - "${SENTINEL_PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - monitoring

  # Grafana: Visualisierung und Dashboard
  grafana:
    image: grafana/grafana:11.0.0
    container_name: sentinelclaw-grafana
    restart: unless-stopped
    labels:
      sentinelclaw: "true"
      sentinelclaw.role: "monitoring"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-sentinelclaw}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3002}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - sentinel-internal
      - sentinel-scanning
    ports:
      - "${SENTINEL_GRAFANA_PORT:-3002}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      prometheus:
        condition: service_healthy
    profiles:
      - monitoring

  # PostgreSQL: Produktions-Datenbank (optional)
  postgres:
    image: postgres:16-alpine
    container_name: sentinelclaw-postgres
    restart: unless-stopped
    labels:
      sentinelclaw: "true"
      sentinelclaw.role: "database"
    environment:
      POSTGRES_DB: ${SENTINEL_DB_NAME:-sentinelclaw}
      POSTGRES_USER: ${SENTINEL_DB_USER:-sentinel}
      POSTGRES_PASSWORD: ${SENTINEL_DB_PASSWORD:-changeme}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sentinel-internal
      - sentinel-scanning
    ports:
      - "${SENTINEL_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SENTINEL_DB_USER:-sentinel} -d ${SENTINEL_DB_NAME:-sentinelclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgresql

# Netzwerk-Konfiguration
networks:
  # Internes Netzwerk: API ↔ Watchdog Kommunikation
  sentinel-internal:
    driver: bridge
    internal: true

  # Scan-Netzwerk: Frontend ↔ API + Internet-Zugang für API
  sentinel-scanning:
    driver: bridge

# Persistente Volumes
volumes:
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
