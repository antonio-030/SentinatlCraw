# SentinelClaw — Docker Compose Konfiguration
# Startet alle Services für den PoC-Betrieb

services:
  # MCP-Server: Exponiert Pentest-Tools als MCP-Services
  mcp-server:
    build:
      context: .
      dockerfile: docker/mcp-server/Dockerfile
    container_name: sentinelclaw-mcp
    restart: unless-stopped
    labels:
      sentinelclaw: "true"
      sentinelclaw.role: "mcp-server"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    # Docker-Socket-Zugriff für Tool-Ausführung in der Sandbox
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    networks:
      - sentinel-internal
    ports:
      - "${SENTINEL_MCP_PORT:-8080}:8080"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/sse')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Sandbox: Isolierter Container für nmap, nuclei und andere Tools
  sandbox:
    build:
      context: .
      dockerfile: docker/sandbox/Dockerfile
    container_name: sentinelclaw-sandbox
    restart: unless-stopped
    labels:
      sentinelclaw: "true"
      sentinelclaw.role: "sandbox"
    # Sicherheits-Härtung
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW          # Für nmap Raw-Socket-Scans (SYN-Scan)
    read_only: true
    tmpfs:
      - /tmp:size=100M
      - /home/scanner:size=50M
    security_opt:
      - no-new-privileges:true
    volumes:
      # Workspace-Dateien für OpenClaw Agent-Konfiguration
      - ./workspace:/sandbox/.openclaw/workspace:ro
    deploy:
      resources:
        limits:
          cpus: "${SENTINEL_SANDBOX_CPU_LIMIT:-2.0}"
          memory: "${SENTINEL_SANDBOX_MEMORY_LIMIT:-2g}"
          pids: ${SENTINEL_SANDBOX_PID_LIMIT:-256}
    networks:
      - sentinel-internal
      - sentinel-scanning
    healthcheck:
      test: ["CMD", "nmap", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Watchdog: Unabhaengiger Ueberwachungsprozess (siehe docs/KILL_SWITCH.md §7)
  watchdog:
    build:
      context: .
      dockerfile: docker/mcp-server/Dockerfile
    container_name: sentinelclaw-watchdog
    restart: unless-stopped
    command: ["python", "-m", "src.watchdog"]
    # Docker-Socket-Zugriff für Kill-Pfad 2 (Container-Kill)
    user: root
    # Healthcheck überschreiben: Watchdog ist kein HTTP-Server
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      sentinelclaw: "true"
      sentinelclaw.role: "watchdog"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    volumes:
      # Docker-Socket fuer Container-Ueberwachung und Kill-Pfad 2
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Datenbank-Zugriff (gleicher Pfad wie MCP-Server)
      - ./data:/app/data
    networks:
      - sentinel-internal
    env_file:
      - .env
    depends_on:
      mcp-server:
        condition: service_healthy

  # Prometheus: Metriken-Sammlung und Alerting
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sentinelclaw-prometheus
    restart: unless-stopped
    labels:
      sentinelclaw: "true"
      sentinelclaw.role: "monitoring"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    volumes:
      - ./configs/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    networks:
      - sentinel-internal
      - sentinel-scanning
    ports:
      - "${SENTINEL_PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - monitoring

  # Grafana: Visualisierung und Dashboard
  grafana:
    image: grafana/grafana:11.0.0
    container_name: sentinelclaw-grafana
    restart: unless-stopped
    labels:
      sentinelclaw: "true"
      sentinelclaw.role: "monitoring"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-sentinelclaw}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - sentinel-internal
      - sentinel-scanning
    ports:
      - "${SENTINEL_GRAFANA_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      prometheus:
        condition: service_healthy
    profiles:
      - monitoring

  # PostgreSQL: Produktions-Datenbank (optional — nur wenn SENTINEL_DB_TYPE=postgresql)
  postgres:
    image: postgres:16-alpine
    container_name: sentinelclaw-postgres
    restart: unless-stopped
    labels:
      sentinelclaw: "true"
      sentinelclaw.role: "database"
    environment:
      POSTGRES_DB: ${SENTINEL_DB_NAME:-sentinelclaw}
      POSTGRES_USER: ${SENTINEL_DB_USER:-sentinel}
      POSTGRES_PASSWORD: ${SENTINEL_DB_PASSWORD:-changeme}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sentinel-internal
      - sentinel-scanning
    ports:
      - "${SENTINEL_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SENTINEL_DB_USER:-sentinel} -d ${SENTINEL_DB_NAME:-sentinelclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgresql

# Netzwerk-Konfiguration
networks:
  # Internes Netzwerk: MCP-Server ↔ Sandbox Kommunikation
  sentinel-internal:
    driver: bridge
    internal: true    # Kein Internet-Zugang

  # Scan-Netzwerk: Sandbox → Scan-Ziele
  # Zugriff auf Ziele wird über Scope-Validator und Firewall-Regeln kontrolliert
  sentinel-scanning:
    driver: bridge

# Persistente Volumes
volumes:
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
