# SentinelClaw — Prometheus-Konfiguration
# Scrape-Intervalle und Ziele für das Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert-Rules einbinden
rule_files:
  - "alerts.yml"

scrape_configs:
  # SentinelClaw API — Prometheus-Metriken (läuft auf dem Host)
  - job_name: "sentinelclaw-api"
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:3001"]
        labels:
          service: "sentinelclaw-api"
          environment: "production"

  # MCP-Server — SSE-Endpoint (Docker-interner Hostname)
  - job_name: "sentinelclaw-mcp"
    metrics_path: "/sse"
    scrape_interval: 30s
    static_configs:
      - targets: ["sentinelclaw-mcp:8080"]
        labels:
          service: "sentinelclaw-mcp"
          environment: "production"
