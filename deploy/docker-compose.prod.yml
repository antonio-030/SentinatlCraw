# SentinelClaw — Production Docker-Compose
# Startet NemoClaw-Gateway, API, Frontend (Nginx), Sandbox und Watchdog
#
# LLM-Provider wird im NemoClaw-Gateway konfiguriert:
#   NEMOCLAW_LLM_PROVIDER=claude|azure|ollama
#   NEMOCLAW_LLM_API_KEY=...

version: "3.8"

services:
  # NemoClaw-Gateway — Agent-Runtime mit OpenClaw + OpenShell
  # Konfiguriert den LLM-Provider (Claude, Azure, Ollama)
  nemoclaw:
    image: nvidia/nemoclaw:1.0.0
    environment:
      - NEMOCLAW_GATEWAY_NAME=nemoclaw
      - NEMOCLAW_LLM_PROVIDER=${NEMOCLAW_LLM_PROVIDER:-claude}
      - NEMOCLAW_LLM_API_KEY=${NEMOCLAW_LLM_API_KEY:-}
      - NEMOCLAW_SANDBOX_POLICY=strict
    volumes:
      - nemoclaw-data:/var/lib/nemoclaw
    networks:
      - sentinel-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "openclaw", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SentinelClaw API — verbindet sich zum NemoClaw-Gateway
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file: .env.prod
    environment:
      - SENTINEL_OPENSHELL_GATEWAY_NAME=nemoclaw
    ports:
      - "3001:3001"
    volumes:
      - ../data:/app/data
    depends_on:
      nemoclaw:
        condition: service_healthy
    networks:
      - sentinel-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend — Nginx mit SSL
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./certs:/etc/ssl/certs:ro
      - ./private:/etc/ssl/private:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sentinel-internal
    restart: unless-stopped

  # Sandbox — gehärteter Tool-Container (nmap, nuclei)
  sandbox:
    image: sentinelclaw/sandbox:0.1.0
    build:
      context: ../docker/sandbox
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    read_only: true
    tmpfs:
      - /tmp:size=100M
      - /home/scanner:size=50M
    security_opt:
      - no-new-privileges
    volumes:
      # Workspace-Dateien für OpenClaw Agent-Konfiguration
      - ../workspace:/sandbox/.openclaw/workspace:ro
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
          pids: 256
    networks:
      - sentinel-internal
      - sentinel-scanning
    restart: unless-stopped

  # Watchdog — überwacht Scans und Kill-Switch
  watchdog:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    command: python -m src.watchdog
    env_file: .env.prod
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../data:/app/data
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sentinel-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

volumes:
  nemoclaw-data:

networks:
  sentinel-internal:
    driver: bridge
    internal: true
  sentinel-scanning:
    driver: bridge
